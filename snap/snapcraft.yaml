name: orooster
title: ORooster
base: core24
version: '0.1.0'
summary: A native Linux desktop client for Ollama
description: |
  ORooster is a native Linux desktop client for Ollama. It provides a clean,
  fast chat interface to interact with locally-running LLMs — no browser required.

  Unlike web-based UIs, ORooster runs as a lightweight native app (~13 MB) with
  system tray integration, streaming responses, and automatic dark/light theme support.

  Features:
    - Streaming chat with real-time token-by-token response rendering
    - Model selector to switch between installed Ollama models
    - Markdown rendering with code blocks and syntax highlighting
    - System tray integration with minimize to tray functionality
    - Dark/light theme that follows system preference automatically
    - Connection status indicator showing Ollama daemon status

license: MIT
source-code: https://github.com/mehdishahdoost/orooster
issues: https://github.com/mehdishahdoost/orooster/issues
contact: mhshdst@gmail.com
website: https://github.com/mehdishahdoost/orooster

grade: stable
confinement: strict

platforms:
  amd64:
    build-on: amd64
    build-for: amd64

parts:
  orooster:
    plugin: nil
    source: .

    build-packages:
      - build-essential
      - curl
      - pkg-config
      - libssl-dev
      - libglib2.0-dev
      - libgtk-3-dev
      - libjavascriptcoregtk-4.1-dev
      - libsoup-3.0-dev
      - libwebkit2gtk-4.1-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - ca-certificates
      - git

    build-snaps:
      - node/20/stable
      - rustup

    build-environment:
      - CARGO_HOME: ${SNAPCRAFT_PART_BUILD}/.cargo
      - RUSTUP_HOME: ${SNAPCRAFT_PART_BUILD}/.rustup
      - PATH: ${SNAPCRAFT_PART_BUILD}/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/bin:${PATH}

    override-build: |
      # Ensure rust is available via rustup
      cargo --version
      rustc --version

      # Install npm dependencies
      npm ci

      # Build Tauri application (produces .deb in src-tauri/target/release/bundle/deb/)
      npx tauri build --bundles deb

      # Create installation directory structure
      mkdir -p ${SNAPCRAFT_PART_INSTALL}/usr/bin
      mkdir -p ${SNAPCRAFT_PART_INSTALL}/usr/share/applications
      mkdir -p ${SNAPCRAFT_PART_INSTALL}/usr/share/icons/hicolor/128x128/apps

      # Extract the built .deb contents
      DEB_FILE=$(ls ${SNAPCRAFT_PART_BUILD}/src-tauri/target/release/bundle/deb/*.deb | head -1)
      dpkg-deb -x "${DEB_FILE}" extracted/

      # Install binary and assets
      cp extracted/usr/bin/orooster ${SNAPCRAFT_PART_INSTALL}/usr/bin/orooster
      cp ${SNAPCRAFT_PART_BUILD}/src-tauri/icons/128x128.png ${SNAPCRAFT_PART_INSTALL}/usr/share/icons/hicolor/128x128/apps/orooster.png
    
  desktop:
    plugin: dump
    source: snap/gui/
    organize:
      orooster.desktop: usr/share/applications/orooster.desktop

apps:
  orooster:
    command: usr/bin/orooster
    common-id: com.mehdishahdoost.orooster
    desktop: usr/share/applications/orooster.desktop
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - unity7
      - network
      - network-observe
      - home
    environment:
      # Ensure the app can find its config directory
      XDG_CONFIG_HOME: ${SNAP_USER_COMMON}/.config
