name: orooster
title: ORooster
type: app
base: core22
version: '0.1.0'
summary: A native Linux desktop client for Ollama
license: MIT
source-code: https://github.com/mehdishahdoost/orooster
contact: mhshdst@gmail.com

description: |
  ORooster is a native Linux desktop client for Ollama. It provides a clean,
  fast chat interface to interact with locally-running LLMs — no browser required.

grade: stable
confinement: strict

architectures:
  - amd64

parts:
  orooster-bin:
    plugin: dump
    source: src-tauri/target/release/bundle/deb/ORooster_0.1.0_amd64.deb
    source-type: deb
    stage-packages:
      - libayatana-appindicator3-1
      - libwebpkit2gtk-4.1-0
    prime:
      - usr/bin/ORooster
      - usr/share/applications/ORooster.desktop
      - usr/share/icons/hicolor/*/apps/ORooster.png

  # Rename binary for snap
  setup:
    plugin: nil
    after: [orooster-bin]
    override-prime: |
      prime_dir=${SNAPCRAFT_PRIME}
      mkdir -p ${prime_dir}/usr/bin
      cp ${prime_dir}/usr/bin/ORooster ${prime_dir}/usr/bin/orooster
      # Fix desktop file name
      if [ -f ${prime_dir}/usr/share/applications/ORooster.desktop ]; then
        mv ${prime_dir}/usr/share/applications/ORooster.desktop ${prime_dir}/usr/share/applications/orooster.desktop
      fi
      # Fix icon references
      if [ -d ${prime_dir}/usr/share/icons/hicolor/128x128/apps ]; then
        cp ${prime_dir}/usr/share/icons/hicolor/128x128/apps/ORooster.png ${prime_dir}/usr/share/icons/hicolor/128x128/apps/orooster.png || true
      fi

  desktop-file:
    plugin: dump
    source: snap/gui/
    stage:
      - orooster.desktop

apps:
  orooster:
    command: usr/bin/orooster
    desktop: usr/share/applications/orooster.desktop
    common-id: com.mehdishahdoost.orooster
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - unity7
      - network
      - home
    environment:
      XDG_CONFIG_HOME: ${SNAP_USER_COMMON}/.config
