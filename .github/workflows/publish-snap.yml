jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: |
          npx tauri build --bundles deb,appimage,snap

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-artifacts
          path: src-tauri/target/release/bundle/
          retention-days: 1

  build-snap:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: tauri-artifacts
          path: src-tauri/target/release/bundle/

      - name: Build Snap package
        uses: snapcore/action-build@v1
        with:
          path: src-tauri/target/release/bundle/

      - name: Verify Snap package
        run: |
          ls -la src-tauri/target/release/bundle/
          find . -name "*.snap" -type f | xargs ls -lh

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: orooster-snap
          path: src-tauri/target/release/bundle/**/*.snap
          retention-days: 30

  publish:
    needs: build-snap
    runs-on: ubuntu-latest

    steps:
      - name: Download Snap artifact
        uses: actions/download-artifact@v4
        with:
          name: orooster-snap

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        with:
          snap: *.snap
          release: ${{ github.event.inputs.channel || 'stable' }}
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}

      - name: Notify on success
        run: |
          echo "✅ Successfully published ORooster to Snap Store!"
          echo "📦 Available at: https://snapcraft.io/orooster"
