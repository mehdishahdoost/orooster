name: Publish to Snap Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string
      channel:
        description: 'Snap Store channel'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - candidate
          - beta
          - edge

env:
  CARGO_TERM_COLOR: always

jobs:
  build-snap:
    # Build stage: compile everything and produce the .snap file
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup build environment in container
      run: |
        # Update package lists
        apt-get update
        
        # Install essential build tools
        apt-get install -y \
          curl \
          wget \
          git \
          build-essential \
          sudo \
          snapd
        
        # Enable and start snapd
        systemctl enable snapd || true
        systemctl start snapd || true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          src-tauri/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install Tauri system dependencies
      run: |
        apt-get update
        apt-get install -y \
          pkg-config \
          libssl-dev \
          libglib2.0-dev \
          libgtk-3-dev \
          libjavascriptcoregtk-4.1-dev \
          libsoup-3.0-dev \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev

    - name: Install npm dependencies
      run: npm ci

    - name: Build Tauri application
      run: |
        npx tauri build --bundles deb
        
    - name: Extract built artifacts
      run: |
        # Verify the .deb was built
        ls -la src-tauri/target/release/bundle/deb/
        
        # Copy the binary and assets for snap staging
        mkdir -p snap/stage/usr/bin
        mkdir -p snap/stage/usr/share/applications
        mkdir -p snap/stage/usr/share/icons/hicolor/128x128/apps
        
        # Extract .deb contents to inspect structure
        DEB_FILE=$(ls src-tauri/target/release/bundle/deb/*.deb | head -1)
        dpkg-deb -x "$DEB_FILE" extracted/
        
        # Debug: show what was extracted
        echo "=== Extracted structure ==="
        find extracted/ -type f | head -20
        
        # Copy binary (Tauri actually names it 'app', not ORooster)
        cp extracted/usr/bin/app snap/stage/usr/bin/orooster
        cp src-tauri/icons/128x128.png snap/stage/usr/share/icons/hicolor/128x128/apps/orooster.png
        cp snap/gui/orooster.desktop snap/stage/usr/share/applications/orooster.desktop

    - name: Upload snap staging artifacts
      uses: actions/upload-artifact@v4
      with:
        name: orooster-snap-stage
        path: snap/stage/
        retention-days: 1

  build-snap-package:
    # Second stage: package the compiled artifacts into a .snap file
    needs: build-snap
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download built artifacts
      uses: actions/download-artifact@v4
      with:
        name: orooster-snap-stage
        path: snap/stage/

    - name: Install Snapcraft
      uses: samuelmeuli/action-snapcraft@v3
      with:
        snapcraft_token: ${{ secrets.SNAPCRAFT_TOKEN }}

    - name: Build Snap package
      run: |
        snapcraft pack --verbose --destructive-mode

    - name: Verify Snap package
      run: |
        ls -lh *.snap
        unsquashfs -l *.snap | head -20

    - name: Upload Snap artifact
      uses: actions/upload-artifact@v4
      with:
        name: orooster-snap
        path: orooster_*.snap
        retention-days: 30

  publish:
    # Final stage: publish to Snap Store
    needs: [build-snap, build-snap-package]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Snap artifact
      uses: actions/download-artifact@v4
      with:
        name: orooster-snap

    - name: Install Snapcraft
      uses: samuelmeuli/action-snapcraft@v3
      with:
        snapcraft_token: ${{ secrets.SNAPCRAFT_TOKEN }}

    - name: Publish to Snap Store
      run: |
        SNAP_FILE=$(ls orooster_*.snap | head -1)
        echo "Publishing: $SNAP_FILE"
        snapcraft upload --release=${{ github.event.inputs.channel || 'stable' }} "$SNAP_FILE"

    - name: Notify on success
      run: |
        VERSION="${{ github.event.inputs.version || github.ref_name }}"
        echo "✅ Successfully published ORooster to Snap Store!"
        echo "📦 Available at: https://snapcraft.io/orooster"
