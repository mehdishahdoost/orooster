name: Publish to Snap Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string
      channel:
        description: 'Snap Store channel'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - candidate
          - beta
          - edge

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          name: orooster-snap
          path: .

          path: '*.snap'
          retention-days: 30

  publish:
    needs: build-snap
    runs-on: ubuntu-latest

    steps:
      - name: Download Snap artifact
        uses: actions/download-artifact@v4
        with:
          name: orooster-snap

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        with:
          snap: orooster_*.snap
          release: ${{ github.event.inputs.channel || 'stable' }}
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}

      - name: Notify on success
        run: |
          echo "✅ Successfully published ORooster to Snap Store!"
          echo "📦 Available at: https://snapcraft.io/orooster"
