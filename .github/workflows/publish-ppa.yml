name: Publish to PPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libssl-dev \
          libglib2.0-dev \
          libgtk-3-dev \
          libjavascriptcoregtk-4.1-dev \
          libsoup-3.0-dev \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          debhelper \
          devscripts \
          dput-ng \
          gnupg \
          cargo \
          npm
          
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-
          
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-index-
          
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: src-tauri/target
        key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-build-
          
    - name: Install npm dependencies
      run: npm ci
      
    - name: Import GPG signing key
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      run: |
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import --no-tty --passphrase "$GPG_PASSPHRASE"
        echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
        echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
        gpgconf --kill gpg-agent
        gpgconf --launch gpg-agent
        # Verify key was imported
        gpg --list-secret-keys --keyid-format LONG
        
    - name: Setup SSH for Launchpad
      env:
        LAUNCHPAD_SSH_KEY: ${{ secrets.LAUNCHPAD_SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$LAUNCHPAD_SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H bazaar.launchpad.net >> ~/.ssh/known_hosts
        # Test SSH connection
        ssh -T git@bazaar.launchpad.net || true  # Expected to fail but tests connectivity
        
    - name: Extract version from tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          # Extract version from git tag (remove 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        # Upstream version is everything before the first hyphen (for orig tarball naming)
        UPSTREAM_VERSION=${VERSION%%-*}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "UPSTREAM_VERSION=$UPSTREAM_VERSION" >> $GITHUB_ENV
        echo "Building version: $VERSION (upstream: $UPSTREAM_VERSION)"
        
    - name: Update debian/changelog
      run: |
        # Update changelog with current version and date
        RELEASE_DATE=$(date -R)
        printf '%s\n' \
          "orooster ($VERSION-1) jammy; urgency=medium" \
          "" \
          "  * Release version $VERSION" \
          "  * Built from Tauri application" \
          "  * Native Linux desktop client for Ollama" \
          "  * Automated PPA build from GitHub Actions" \
          "" \
          " -- Mehdi Shahdoost <mhshdst@gmail.com>  $RELEASE_DATE" \
          > src-tauri/debian/changelog
        
    - name: Build Tauri application
      run: |
        npx tauri build --bundles deb
        
    - name: Create source package
      run: |
        cd src-tauri
        
        # Create orig tarball (named with upstream version only, no Debian revision)
        TEMP_SOURCE_DIR="/tmp/orooster-$UPSTREAM_VERSION"
        rm -rf "$TEMP_SOURCE_DIR"
        mkdir -p "$TEMP_SOURCE_DIR"
        
        # Copy source files
        cp -r ../src "$TEMP_SOURCE_DIR/"
        cp -r ../public "$TEMP_SOURCE_DIR/"
        cp -r ../index.html "$TEMP_SOURCE_DIR/"
        cp -r ../package*.json "$TEMP_SOURCE_DIR/"
        cp -r ../tsconfig*.json "$TEMP_SOURCE_DIR/"
        cp -r ../vite.config.ts "$TEMP_SOURCE_DIR/"
        cp -r ../src-tauri "$TEMP_SOURCE_DIR/"
        cp -r ../eslint.config.js "$TEMP_SOURCE_DIR/"
        
        # Remove build artifacts
        rm -rf "$TEMP_SOURCE_DIR/node_modules"
        rm -rf "$TEMP_SOURCE_DIR/src-tauri/target"
        rm -rf "$TEMP_SOURCE_DIR/dist"
        
        # Create tar.gz in parent of src-tauri (where debuild looks)
        cd /tmp
        tar -czf "$GITHUB_WORKSPACE/orooster_$UPSTREAM_VERSION.orig.tar.gz" "orooster-$UPSTREAM_VERSION"
        rm -rf "$TEMP_SOURCE_DIR"
        
        # Build source package (skip signing; handled in next step)
        cd "$GITHUB_WORKSPACE/src-tauri"
        debuild -S -sa -uc -us
        
    - name: Sign source package
      env:
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      run: |
        cd "$GITHUB_WORKSPACE"
        
        # Pre-seed the GPG agent with the passphrase so debsign can use it non-interactively
        GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep 'sec' | head -1 | sed 's/.*\/\([A-F0-9]*\).*/\1/')
        echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 --sign --local-user "$GPG_KEY_ID" -o /dev/null /dev/null 2>/dev/null || true
        
        CHANGES_FILE=$(ls orooster_$VERSION-1_source.changes 2>/dev/null || ls orooster_${UPSTREAM_VERSION}-1_source.changes)
        # debsign signs both .dsc and .changes and updates checksums correctly
        debsign -k"$GPG_KEY_ID" "$CHANGES_FILE"
        
    - name: Upload to Launchpad PPA
      env:
        PPA_NAME: ${{ secrets.PPA_NAME }}
      run: |
        CHANGES_FILE=$(ls orooster_$VERSION-1_source.changes 2>/dev/null || ls orooster_${UPSTREAM_VERSION}-1_source.changes)
        echo "Uploading to PPA: $PPA_NAME"
        # Retry upload up to 3 times in case of transient network issues
        for attempt in 1 2 3; do
          echo "Upload attempt $attempt/3"
          if dput "$PPA_NAME" "$CHANGES_FILE"; then
            echo "Upload successful"
            break
          elif [ $attempt -lt 3 ]; then
            echo "Upload failed, retrying in 30 seconds..."
            sleep 30
          else
            echo "Upload failed after 3 attempts"
            exit 1
          fi
        done
        
    - name: Notify on success
      run: |
        echo "✅ Successfully published ORooster version $VERSION to PPA!"
        echo "📦 Package will be available after Launchpad builds complete"
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debian-package-files
        path: |
          *.dsc
          *.tar.gz
          *.changes
        retention-days: 30
