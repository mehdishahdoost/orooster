name: Publish to PPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libssl-dev \
          libglib2.0-dev \
          libgtk-3-dev \
          libjavascriptcoregtk-4.1-dev \
          libsoup-3.0-dev \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          debhelper \
          devscripts \
          dput-ng \
          gnupg \
          cargo \
          npm
          
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-
          
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-index-
          
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: src-tauri/target
        key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-build-
          
    - name: Install npm dependencies
      run: npm ci
      
    - name: Import GPG signing key
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      run: |
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import --no-tty --passphrase "$GPG_PASSPHRASE"
        echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
        echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
        gpgconf --kill gpg-agent
        gpgconf --launch gpg-agent
        # Verify key was imported
        gpg --list-secret-keys --keyid-format LONG
        
    - name: Setup SSH for Launchpad
      env:
        LAUNCHPAD_SSH_KEY: ${{ secrets.LAUNCHPAD_SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$LAUNCHPAD_SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H bazaar.launchpad.net >> ~/.ssh/known_hosts
        # Test SSH connection
        ssh -T git@bazaar.launchpad.net || true  # Expected to fail but tests connectivity
        
    - name: Extract version from tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          # Extract version from git tag (remove 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        # Upstream version is everything before the first hyphen (for orig tarball naming)
        UPSTREAM_VERSION=${VERSION%%-*}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "UPSTREAM_VERSION=$UPSTREAM_VERSION" >> $GITHUB_ENV
        echo "Building version: $VERSION (upstream: $UPSTREAM_VERSION)"
        
    - name: Update debian/changelog
      run: |
        # Update changelog with current version and date
        RELEASE_DATE=$(date -R)
        printf '%s\n' \
          "orooster ($VERSION-2) jammy; urgency=medium" \
          "" \
          "  * Release version $VERSION" \
          "  * Built from Tauri application" \
          "  * Native Linux desktop client for Ollama" \
          "  * Automated PPA build from GitHub Actions" \
          "" \
          " -- Mehdi Shahdoost <mhshdst@gmail.com>  $RELEASE_DATE" \
          > src-tauri/debian/changelog
        
    - name: Build Tauri application
      run: |
        npx tauri build --bundles deb
        
    - name: Create source package
      run: |
        BUILD_DIR="/tmp/ppa-build"
        rm -rf "$BUILD_DIR"
        mkdir -p "$BUILD_DIR"
        
        SOURCE_DIR="$BUILD_DIR/orooster-$UPSTREAM_VERSION"
        mkdir -p "$SOURCE_DIR"
        
        # Copy project files into the source dir
        cp -r src "$SOURCE_DIR/"
        cp -r public "$SOURCE_DIR/"
        cp index.html "$SOURCE_DIR/"
        cp package*.json "$SOURCE_DIR/"
        cp tsconfig*.json "$SOURCE_DIR/"
        cp vite.config.ts "$SOURCE_DIR/"
        cp -r src-tauri "$SOURCE_DIR/"
        cp eslint.config.js "$SOURCE_DIR/"
        
        # Remove build artifacts
        rm -rf "$SOURCE_DIR/node_modules"
        rm -rf "$SOURCE_DIR/src-tauri/target"
        rm -rf "$SOURCE_DIR/dist"
        
        # Move debian/ from src-tauri/ to the package root
        mv "$SOURCE_DIR/src-tauri/debian" "$SOURCE_DIR/debian"
        
        # Create orig tarball in BUILD_DIR (parent of SOURCE_DIR)
        # The orig tarball uses upstream version only (no Debian revision)
        cd "$BUILD_DIR"
        tar -czf "orooster_$UPSTREAM_VERSION.orig.tar.gz" --exclude="orooster-$UPSTREAM_VERSION/debian" "orooster-$UPSTREAM_VERSION"
        
        echo "=== Created orig tarball ==="
        ls -la "orooster_$UPSTREAM_VERSION.orig.tar.gz"
        
        # Create a symlink with full version for debuild compatibility
        # debuild may look for orooster_<full-version>.orig.tar.gz
        ln -sf "orooster_$UPSTREAM_VERSION.orig.tar.gz" "orooster_$VERSION.orig.tar.gz"
        ls -la *.orig.tar.gz
        
        # Build source package from the package root (where debian/ now lives)
        # The orig tarball is in the parent directory (BUILD_DIR)
        cd "$SOURCE_DIR"
        debuild -S -sa -uc -us
        
        # Copy generated files to workspace for signing and upload
        cp "$BUILD_DIR"/orooster_* "$GITHUB_WORKSPACE/"
        
        echo "=== Generated files ==="
        ls -la "$GITHUB_WORKSPACE"/orooster_*
        
    - name: Debug source package files
      run: |
        cd "$GITHUB_WORKSPACE"
        echo "=== Files in workspace root ==="
        ls -la orooster_* 2>/dev/null || echo "No orooster_* files found"
        echo ""
        echo "=== .changes file content ==="
        cat orooster_*_source.changes 2>/dev/null || echo "No .changes file"
        echo ""
        echo "=== .dsc file content ==="
        cat orooster_*.dsc 2>/dev/null || echo "No .dsc file"
        echo ""
        echo "=== GPG key info ==="
        gpg --list-secret-keys --keyid-format LONG
        
    - name: Sign source package
      env:
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      run: |
        cd "$GITHUB_WORKSPACE"
        
        # Get the GPG key ID
        GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep 'sec' | head -1 | sed 's/.*\/\([A-F0-9]*\).*/\1/')
        echo "Using GPG key: $GPG_KEY_ID"
        
        # Pre-seed the GPG agent with the passphrase
        echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 --sign --local-user "$GPG_KEY_ID" -o /dev/null /dev/null 2>/dev/null || true
        
        CHANGES_FILE=$(ls orooster_$VERSION-2_source.changes 2>/dev/null || ls orooster_${UPSTREAM_VERSION}-2_source.changes)
        echo "Signing: $CHANGES_FILE"
        
        # debsign signs both .dsc and .changes and updates checksums correctly
        debsign -k"$GPG_KEY_ID" "$CHANGES_FILE"
        
        echo ""
        echo "=== Signed .changes file ==="
        cat "$CHANGES_FILE"
        echo ""
        echo "=== Verify signature ==="
        gpg --verify "$CHANGES_FILE" 2>&1 || true
        
    - name: Upload to Launchpad PPA
      env:
        PPA_NAME: ${{ secrets.PPA_NAME }}
      run: |
        CHANGES_FILE=$(ls orooster_$VERSION-2_source.changes 2>/dev/null || ls orooster_${UPSTREAM_VERSION}-2_source.changes)
        echo "Uploading to PPA: $PPA_NAME"
        # Retry upload up to 3 times in case of transient network issues
        for attempt in 1 2 3; do
          echo "Upload attempt $attempt/3"
          if dput "$PPA_NAME" "$CHANGES_FILE"; then
            echo "Upload successful"
            break
          elif [ $attempt -lt 3 ]; then
            echo "Upload failed, retrying in 30 seconds..."
            sleep 30
          else
            echo "Upload failed after 3 attempts"
            exit 1
          fi
        done
        
    - name: Notify on success
      run: |
        echo "✅ Successfully published ORooster version $VERSION to PPA!"
        echo "📦 Package will be available after Launchpad builds complete"
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debian-package-files
        path: |
          *.dsc
          *.tar.gz
          *.changes
        retention-days: 30
